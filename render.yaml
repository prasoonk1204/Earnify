services:
  - type: web
    name: earnify-api
    runtime: node
    plan: free

    buildCommand: >
      pnpm install &&
      pnpm --filter @earnify/db db:generate &&
      pnpm build

    startCommand: pnpm --filter @earnify/api start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: earnify-db
          property: connectionString
      - key: STELLAR_ADMIN_SECRET
        sync: false # Set manually in Render dashboard
      - key: STELLAR_NETWORK
        value: testnet
      - key: SOROBAN_RPC_HOST
        value: https://soroban-testnet.stellar.org
      - key: API_PORT
        value: "3001"

  - type: postgres
    name: earnify-db
    plan: free

    # Database auto-configured
    # Note: Use external Neon DB instead if you prefer managed postgres
    # Uncomment above and remove this section, then set DATABASE_URL manually
