name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Validate contracts
        run: node scripts/validate-contracts.js

      - name: Build
        run: pnpm build

  deploy-database:
    name: Deploy database
    runs-on: ubuntu-latest
    needs: validate
    env:
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

    steps:
      - name: Checkout
        if: env.PROD_DATABASE_URL != ''
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: env.PROD_DATABASE_URL != ''
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: env.PROD_DATABASE_URL != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: env.PROD_DATABASE_URL != ''
        run: pnpm install --frozen-lockfile

      - name: Deploy Prisma migrations
        if: env.PROD_DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ env.PROD_DATABASE_URL }}
          PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"
        run: |
          pnpm --filter @earnify/db db:generate
          pnpm --filter @earnify/db db:deploy

      - name: Skip database migrations
        if: env.PROD_DATABASE_URL == ''
        run: echo "Skipping database migrations because PROD_DATABASE_URL is not configured."

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: validate
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

    steps:
      - name: Checkout
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        working-directory: apps/web
        run: pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel app
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        working-directory: apps/web
        run: pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel app
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        working-directory: apps/web
        run: pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Skip Vercel deployment
        if: env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == ''
        run: echo "Skipping Vercel deployment because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID_WEB is not configured."

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs:
      - validate
      - deploy-database
    env:
      RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}

    steps:
      - name: Trigger Render deployment
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          curl --fail --request POST \
            --url "$RENDER_DEPLOY_HOOK" \
            --header "content-type: application/json"

      - name: Trigger Railway deployment
        if: env.RAILWAY_DEPLOY_HOOK != ''
        run: |
          curl --fail --request POST \
            --url "$RAILWAY_DEPLOY_HOOK" \
            --header "content-type: application/json"

      - name: Skip backend deployment hooks
        if: env.RENDER_DEPLOY_HOOK == '' && env.RAILWAY_DEPLOY_HOOK == ''
        run: echo "Skipping backend deployment hooks because no deploy hook secrets are configured."

  contract-deployment-notice:
    name: Contract deployment notice
    runs-on: ubuntu-latest
    needs:
      - deploy-frontend
      - deploy-backend

    steps:
      - name: Print contract deployment instructions
        run: |
          echo "Deployment completed."
          echo ""
          echo "Frontend deployed to Vercel."
          echo "Backend deployment hook completed."
          echo "Database migrations applied."
          echo ""
          echo "Manual contract deployment remains separate:"
          echo "  export STELLAR_ADMIN_SECRET='your-secret'"
          echo "  export STELLAR_NETWORK='testnet'"
          echo "  ./scripts/deploy-contract.sh"
