version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: earnify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-earnify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-earnify}
      POSTGRES_DB: ${POSTGRES_DB:-earnify}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: earnify-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

